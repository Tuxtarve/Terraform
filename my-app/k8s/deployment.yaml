apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2 # 서버 2대를 유지해줘!
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: REPLACE_ME_WITH_ECR_URL # 나중에 CI/CD가 이 부분을 실제 주소로 바꿀 거예요.
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  type: LoadBalancer # AWS가 자동으로 공인 IP(L4 배런서)를 만들어줍니다.
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: my-app
