# /root/Terraform-1/monitoring/values.yaml

# 1. 그라파나 설정
grafana:
  adminPassword: "soldesk"
  service:
    type: LoadBalancer
  # [추가] 저사양 노드를 위한 리소스 제한
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "100m"

# 2. 프로메테우스 설정 (이 섹션을 새로 추가하거나 수정하세요)
prometheus:
  prometheusSpec:
    retention: 2h # 데이터 보관 2시간 (메모리 절약)
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"

# 3. 알람 매니저 설정
alertmanager:
  config:
    route:
      group_by: ['alertname']
      receiver: 'slack-notifications'
    receivers:
      - name: 'slack-notifications'
  # [추가] 알람매니저도 가볍게!
  resources:
    requests:
      memory: "64Mi"
    limits:
      memory: "128Mi"